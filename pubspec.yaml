name: mydiet
description: "App Flutter offline per importare e gestire una dieta con OCR."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  uuid: ^4.5.1
  image_picker: ^1.1.2
  image_cropper: ^9.1.0
  google_mlkit_text_recognition: ^0.15.0
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.3
  collection: ^1.19.1
  pdf: ^3.11.1
  printing: ^5.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icon/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icon/icon.png
